<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <!-- Royal Gold Gradients -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="30%" stop-color="#FFDF00" />
      <stop offset="70%" stop-color="#AA7C11" />
      <stop offset="100%" stop-color="#6A4E0B" />
    </linearGradient>
    <linearGradient id="gold-light" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF3A8" />
      <stop offset="100%" stop-color="#D4AF37" />
    </linearGradient>

    <!-- Deep Royal Blue Gradients for Water/Trust -->
    <linearGradient id="royal-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A" />
      <stop offset="50%" stop-color="#1D4ED8" />
      <stop offset="100%" stop-color="#1E40AF" />
    </linearGradient>
    <linearGradient id="teal-water" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>
    <linearGradient id="droplet-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#0284C7" stop-opacity="0.95" />
    </linearGradient>

    <!-- Drop Shadow for Depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Outer Ring / Gold Border -->
  <circle cx="256" cy="256" r="236" fill="#FFFFFF" stroke="url(#gold)" stroke-width="12" filter="url(#shadow)" />
  <circle cx="256" cy="256" r="218" fill="none" stroke="#1E3A8A" stroke-width="3" />
  
  <!-- Outer Blue Banner Ring -->
  <circle cx="256" cy="256" r="176" fill="none" stroke="url(#gold)" stroke-width="6" />

  <!-- Background Pattern for Center -->
  <circle cx="256" cy="256" r="172" fill="#F0F9FF" />

  <!-- Circular Decorative Wreath / Leaves (Kerala Style Traditional Borders) -->
  <g stroke="url(#gold)" stroke-width="1.5" fill="none">
    <!-- Left Leaf Arc -->
    <path d="M 120,256 C 120,330 180,390 256,390" stroke-dasharray="6,4" />
    <!-- Right Leaf Arc -->
    <path d="M 392,256 C 392,330 332,390 256,390" stroke-dasharray="6,4" />
  </g>

  <!-- Ground Water Aquifers / Geological Layers Representation (Bottom Center) -->
  <g clip-path="url(#center-clip)">
    <clipPath id="center-clip">
      <circle cx="256" cy="256" r="170" />
    </clipPath>
    
    <!-- Wave / Ground Layers at the Bottom -->
    <path d="M 86,300 Q 171,280 256,300 T 426,300 L 426,426 L 86,426 Z" fill="#E2E8F0" opacity="0.9" />
    <path d="M 86,330 Q 171,310 256,330 T 426,330 L 426,426 L 86,426 Z" fill="#94A3B8" opacity="0.8" />
    <path d="M 86,360 Q 171,350 256,360 T 426,360 L 426,426 L 86,426 Z" fill="url(#royal-blue)" />
    
    <!-- Water Table waves -->
    <path d="M 86,380 Q 171,395 256,380 T 426,380 L 426,426 L 86,426 Z" fill="url(#teal-water)" opacity="0.7" />
  </g>

  <!-- Stylized Elegant Rig / Water Well Pump in Center (Gold) -->
  <g id="water-well-rig" transform="translate(211, 140)">
    <!-- Base Plate -->
    <rect x="10" y="110" width="70" height="8" rx="2" fill="url(#gold)" />
    <!-- Vertical Derrick Towers -->
    <line x1="25" y1="110" x2="40" y2="20" stroke="url(#gold)" stroke-width="4" stroke-linecap="round" />
    <line x1="65" y1="110" x2="50" y2="20" stroke="url(#gold)" stroke-width="4" stroke-linecap="round" />
    <!-- Cross Bracing -->
    <line x1="28" y1="90" x2="61" y2="90" stroke="url(#gold)" stroke-width="2.5" />
    <line x1="31" y1="65" x2="58" y2="65" stroke="url(#gold)" stroke-width="2.5" />
    <line x1="34" y1="40" x2="55" y2="40" stroke="url(#gold)" stroke-width="2.5" />
    
    <line x1="25" y1="110" x2="58" y2="90" stroke="url(#gold)" stroke-width="2" />
    <line x1="65" y1="110" x2="31" y2="90" stroke="url(#gold)" stroke-width="2" />
    <line x1="28" y1="90" x2="55" y2="65" stroke="url(#gold)" stroke-width="2" />
    <line x1="61" y1="90" x2="34" y2="65" stroke="url(#gold)" stroke-width="2" />
    <!-- Crown / Top Pulley -->
    <circle cx="45" cy="18" r="7" fill="url(#gold)" />
    <circle cx="45" cy="18" r="3" fill="#FFFFFF" />
  </g>

  <!-- Large Majestic Drop of Pure Water (Overlaying center) -->
  <path d="M 256,120 C 256,120 316,210 316,250 C 316,283 289,310 256,310 C 223,310 196,283 196,250 C 196,210 256,120 256,120 Z" 
        fill="url(#droplet-grad)" 
        stroke="url(#gold-light)" 
        stroke-width="3" 
        filter="url(#shadow)" />
  
  <!-- Droplet Gloss Highlight -->
  <path d="M 236,210 C 236,190 256,150 256,150 C 256,150 248,185 238,212 C 237,215 235,213 236,210 Z" fill="#FFFFFF" opacity="0.6" />
  
  <!-- Small stylized wave inside droplet -->
  <path d="M 210,255 Q 233,240 256,255 T 302,255 C 302,255 295,290 256,290 C 217,290 210,255 210,255 Z" fill="#FFFFFF" opacity="0.25" />

  <!-- Two Traditional Royal Elephants Flanking (Stylized in Gold) -->
  <!-- Left Elephant -->
  <g transform="translate(68, 190) scale(0.65)">
    <path d="M 80,60 C 80,40 50,20 30,35 C 10,50 5,80 15,100 C 25,120 45,120 45,120 C 45,120 40,95 55,90 C 70,85 85,90 90,70 Z" fill="url(#gold)" />
    <!-- Trunk -->
    <path d="M 15,80 C 5,80 -10,100 -5,120 C 0,130 10,125 10,115 C 10,100 20,95 20,95" fill="none" stroke="url(#gold)" stroke-width="10" stroke-linecap="round" />
    <!-- Tusk -->
    <path d="M 18,98 C 12,102 5,100 8,92 C 10,85 20,92 20,92" fill="#FFFFFF" />
    <!-- Ears / Head gear -->
    <path d="M 50,30 Q 75,25 70,55 T 45,70 Z" fill="url(#gold-light)" stroke="url(#gold)" stroke-width="1" />
  </g>
  <!-- Right Elephant (Mirrored) -->
  <g transform="translate(444, 190) scale(0.65) scale(-1, 1)">
    <path d="M 80,60 C 80,40 50,20 30,35 C 10,50 5,80 15,100 C 25,120 45,120 45,120 C 45,120 40,95 55,90 C 70,85 85,90 90,70 Z" fill="url(#gold)" />
    <!-- Trunk -->
    <path d="M 15,80 C 5,80 -10,100 -5,120 C 0,130 10,125 10,115 C 10,100 20,95 20,95" fill="none" stroke="url(#gold)" stroke-width="10" stroke-linecap="round" />
    <!-- Tusk -->
    <path d="M 18,98 C 12,102 5,100 8,92 C 10,85 20,92 20,92" fill="#FFFFFF" />
    <!-- Ears / Head gear -->
    <path d="M 50,30 Q 75,25 70,55 T 45,70 Z" fill="url(#gold-light)" stroke="url(#gold)" stroke-width="1" />
  </g>

  <!-- Text Curved Paths -->
  <!-- Path for Top Text (Clockwise) -->
  <path id="text-path-top" d="M 76,256 A 180,180 0 0,1 436,256" fill="none" />
  <!-- Path for Bottom Text (Counter-Clockwise - using a reverse arc) -->
  <path id="text-path-bottom" d="M 436,256 A 180,180 0 0,1 76,256" fill="none" />

  <!-- Circular Texts -->
  <text font-family="'Inter', 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="20.5" font-weight="800" fill="#1E3A8A" letter-spacing="1.5">
    <textPath href="#text-path-top" startOffset="50%" text-anchor="middle">
      KERALA GROUND WATER DEPARTMENT
    </textPath>
  </text>

  <text font-family="'Inter', 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="19" font-weight="700" fill="#B45309" letter-spacing="2">
    <textPath href="#text-path-bottom" startOffset="50%" text-anchor="middle">
      GOVERNMENT OF KERALA
    </textPath>
  </text>

  <!-- Small star separator icons on Left and Right -->
  <g fill="url(#gold)" stroke="url(#gold)" stroke-width="0.5">
    <!-- Left Star -->
    <polygon points="76,251 78,255 83,255 79,258 81,262 76,260 71,262 73,258 69,255 74,255" />
    <!-- Right Star -->
    <polygon points="436,251 438,255 443,255 439,258 441,262 436,260 431,262 433,258 429,255 434,255" />
  </g>
</svg>
